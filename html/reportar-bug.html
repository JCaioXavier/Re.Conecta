<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Reportar Bug - Re.conecta</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 p-0">
    <div class="login-container d-flex flex-column">
        <div class="header-green d-flex align-items-center justify-content-center position-relative pt-4 pb-5">
            <a href="../index.html" class="text-white position-absolute start-0 ms-3 text-decoration-none" style="top: 20px; font-size: 1.5rem;">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold m-0 text-white">Reportar Bug</h4>
        </div>

        <div class="p-4 form-card">
            <div class="text-center mb-4">
                <i class="bi bi-bug text-success" style="font-size: 3rem;"></i>
                <p class="text-muted small">Encontrou algum erro? Nos ajude a melhorar a plataforma.</p>
            </div>

            <form action="#" method="post">
                <div class="mb-3">
                    <label class="fw-bold mb-1">Título do problema</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-exclamation-circle"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" placeholder="Ex: Erro ao carregar mapa" required />
                    </div>
                </div>

                <div class="mb-4">
                    <label class="fw-bold mb-1">Descrição detalhada</label>
                    <textarea class="form-control" rows="5" style="border: 1px solid #0B5C44; border-radius: 10px;" placeholder="Descreva o que aconteceu..."></textarea>
                </div>

                <div class="mb-4">
                    <label class="btn btn-outline-secondary w-100 py-3" style="border-style: dashed; border-radius: 10px;">
                        <i class="bi bi-camera me-2"></i> Anexar Print/Foto
                        <input type="file" hidden>
                    </label>

                <button type="submit" class="btn btn-reconecta w-100 shadow-sm mt-auto">Enviar Relatório</button>
            </form>
            
        </div>
    </div>
</div>
</body>
</html>
