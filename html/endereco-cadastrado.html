<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Meus Endereços - Re.conecta</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 p-0">
    <div class="login-container d-flex flex-column">
        <div class="header-green d-flex align-items-center justify-content-center position-relative pt-4 pb-5">
            <a href="perfil.html" class="text-white position-absolute start-0 ms-3 text-decoration-none" style="top: 20px; font-size: 1.5rem;">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold m-0 text-white">Meus Endereços</h4>
        </div>

        <div class="p-4 form-card">
            <div id="listaEnderecos">
                <div class="address-card shadow-sm d-flex justify-content-between align-items-start">
                    <div>
                        <div class="d-flex align-items-center mb-1">
                            <h6 class="fw-bold m-0">Casa</h6>
                            <span class="tag-principal">Principal</span>
                        </div>
                        <p class="text-muted small mb-0">Rua Cincinato Pinto, n. 298</p>
                        <p class="text-muted small mb-0">Centro - Maceió/AL</p>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-success btn-sm border-0" onclick="editAddress('Casa', '57020-050', '298')">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                        <button class="btn btn-outline-danger btn-sm border-0" onclick="confirmDeleteAddress(this)">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>

            <button class="btn btn-outline-success w-100 mb-4" onclick="showAddForm()" style="border-radius: 10px; border-style: dashed;">
                <i class="bi bi-plus-lg"></i> Adicionar Novo Endereço
            </button>

            <div id="formEndereco" style="display: none; border-top: 1px solid #eee; padding-top: 15px;">
                <h6 class="fw-bold text-success mb-3" id="formTitle">Editar Endereço</h6>
                
                <div class="mb-3">
                    <input type="text" class="form-control" id="apelido" placeholder="Apelido (Ex: Casa, Trabalho)">
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-8">
                        <input type="text" id="cep" class="form-control" placeholder="CEP (00000-000)" 
                               maxlength="9" oninput="mascaraCEP(this)" onblur="buscarEndereco(this.value)">
                    </div>
                    <div class="col-4">
                        <input type="text" class="form-control" id="numero" placeholder="Nº">
                    </div>
                </div>

                <div class="mb-3">
                    <input type="text" id="logradouro" class="form-control bg-light" placeholder="Rua/Logradouro" readonly>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-8">
                        <input type="text" id="municipio" class="form-control bg-light" placeholder="Cidade" readonly>
                    </div>
                    <div class="col-4">
                        <input type="text" id="estado" class="form-control bg-light" placeholder="UF" readonly>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-secondary w-50" onclick="hideForm()" style="border-radius: 10px;">Cancelar</button>
                    <button class="btn btn-reconecta w-50" onclick="saveAddress()">Salvar</button>
                </div>
                <div id="erro-cep" class="text-danger small mt-2" style="display: none;">CEP não encontrado.</div>
            </div>
            
            <div class="bottom-nav-wrapper">
            <div class="bottom-nav">
                <a href="../index.html" class="nav-item"><i class="bi bi-house-door-fill"></i></a>
                <a href="perfil.html" class="nav-item active"><i class="bi bi-person-fill"></i></a>
                <div class="nav-center" style="display: flex; justify-content: center; align-items: center;">
                    <img src="../images/logo-reconecta-navbar.svg" 
                        alt="Logo" 
                        style="width: px; height: px; margin-top: px;">
                </div>
                <a href="contato-suporte.html" class="nav-item"><i class="bi bi-chat-left-text-fill"></i></a>
                <a href="resgatar-recompensa.html" class="nav-item"><i class="bi bi-shop"></i></a>
        </div>
    </div>
</div>

<script>
    function mascaraCEP(i) {
        var v = i.value;
        if(isNaN(v[v.length-1])){ i.value = v.substring(0, v.length-1); return; }
        i.setAttribute("maxlength", "9");
        v = v.replace(/\D/g, "").replace(/^(\d{5})(\d)/, "$1-$2");
        i.value = v;
    }

    function buscarEndereco(cep) {
        var cepLimpo = cep.replace(/\D/g, '');
        if (cepLimpo.length === 8) {
            var url = 'https://viacep.com.br/ws/' + cepLimpo + '/json/';
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (!data.erro) {
                        document.getElementById('logradouro').value = data.logradouro;
                        document.getElementById('municipio').value = data.localidade;
                        document.getElementById('estado').value = data.uf;
                        document.getElementById('numero').focus();
                        document.getElementById('erro-cep').style.display = 'none';
                    } else {
                        document.getElementById('erro-cep').style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error('Erro ao buscar CEP:', error);
                });
        }
    }

    function showAddForm() {
        document.getElementById('formTitle').innerText = "Novo Endereço";
        document.getElementById('formEndereco').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    function editAddress(apelido, cep, num) {
        document.getElementById('formTitle').innerText = "Editar Endereço";
        document.getElementById('apelido').value = apelido;
        document.getElementById('cep').value = cep;
        document.getElementById('numero').value = num;
        buscarEndereco(cep);
        document.getElementById('formEndereco').style.display = 'block';
    }

    function hideForm() { document.getElementById('formEndereco').style.display = 'none'; }
    function saveAddress() { alert("Endereço salvo!"); hideForm(); }
    function confirmDeleteAddress(btn) { if(confirm("Remover este endereço?")) btn.closest('.address-card').remove(); }
</script>
</body>
</html>
