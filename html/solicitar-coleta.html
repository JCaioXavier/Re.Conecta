<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Solicitar Coleta - Re.conecta</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 p-0">
    <div class="login-container d-flex flex-column">
        <div class="header-green d-flex align-items-center justify-content-center position-relative pt-4 pb-5">
            <a href="../index.html" class="text-white position-absolute start-0 ms-3 text-decoration-none" style="top: 20px; font-size: 1.5rem;">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold m-0 text-white">Solicitar Coleta</h4>
        </div>

        <div class="p-4 form-card">
            <form action="/api/collect/request" method="post">
                <div class="mb-3">
                    <label class="fw-bold mb-1 small text-success">E-mail de Contato</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0 bg-light"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0 bg-light" value="ryan.austin@email.com" readonly />
                    </div>
                    <small class="text-muted" style="font-size: 0.7rem;">Este é o seu e-mail cadastrado.</small>
                </div>

                <div class="mb-3">
                    <label class="fw-bold mb-2">O que deseja descartar?</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-box-seam"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" placeholder="Ex: Monitor, 3 teclados..." required />
                    </div>
                </div>

                <div class="schedule-box mb-3">
                    <div class="schedule-header d-flex justify-content-between align-items-center">
                        <div><i class="bi bi-geo-alt me-2"></i> <span>Local da Coleta</span></div>
                    </div>
                    <div class="schedule-body bg-white p-3" style="border-radius: 0 0 16px 16px; border: 1px solid #0B5C44; border-top: none;">
                        
                        <div class="address-card shadow-sm p-3 mb-3" style="border-radius: 15px; border: 1px solid #e0e0e0; position: relative; background: white;">
                            <div class="d-flex align-items-center mb-1">
                                <h6 class="fw-bold m-0" style="color: #29292e;">Casa</h6>
                                <span class="badge ms-2" style="background-color: #00B37E; border-radius: 10px; font-size: 0.7rem; padding: 4px 10px;">Principal</span>
                                
                                <div class="ms-auto">
                                    <i class="bi bi-pencil-square text-success me-2" style="cursor: pointer;"></i>
                                    <i class="bi bi-trash text-danger" style="cursor: pointer;"></i>
                                </div>
                            </div>
                            <p class="text-muted small mb-0">Rua Cincinato Pinto, n. 298</p>
                            <p class="text-muted small mb-0">Centro - Maceió/AL</p>
                            <input type="radio" name="endereco_selecionado" checked style="position: absolute; top: 15px; right: 15px; opacity: 0;">
                        </div>

                        <button type="button" class="btn w-100 py-2 d-flex align-items-center justify-content-center" 
                                onclick="window.location.href='endereco-cadastrado.html'"
                                style="border: 1px dashed #00B37E; border-radius: 12px; color: #00855E; background: transparent; font-weight: 500;">
                            <i class="bi bi-plus-lg me-2"></i> Adicionar Novo Endereço
                        </button>
                    </div>
                </div>

                <div class="schedule-box">
                    <div class="schedule-header d-flex align-items-center">
                        <i class="bi bi-calendar-event me-2"></i> <span>Agendamento</span>
                    </div>
                    <div class="schedule-body">
                        <div class="row g-2">
                            <div class="col-6">
                                <div class="time-card">
                                    <div class="time-label">Data</div>
                                    <input type="date" class="time-select" style="font-size: 0.8rem;">
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="time-card">
                                    <div class="time-label">Período</div>
                                    <select class="time-select">
                                        <option>Manhã</option>
                                        <option>Tarde</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-reconecta w-100 mb-3 shadow-sm mt-4">Confirmar Solicitação</button>
            </form>
        </div>
        <div class="bottom-nav-wrapper">
            <div class="bottom-nav">
                <a href="../index.html" class="nav-item"><i class="bi bi-house-door-fill"></i></a>
                <a href="perfil.html" class="nav-item"><i class="bi bi-person-fill"></i></a>

                <div class="nav-center">
                    <div class="nav-center" style="display: flex; justify-content: center; align-items: center;">
                        <img src="../images/logo-reconecta-navbar.svg" 
                            alt="Logo" 
                            style="width: px; height: px; margin-top: px;">
                    </div>
                </div>

                <a href="contato-suporte.html" class="nav-item"><i class="bi bi-chat-left-text-fill"></i></a>
                <a href="resgatar-recompensa.html" class="nav-item"><i class="bi bi-shop"></i>
                </a>
            </div>
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Seleciona o formulário de solicitação de coleta
        const form = document.querySelector('form');

        form.addEventListener('submit', async (event) => {
            event.preventDefault(); // Impede o recarregamento da página

            // Captura todos os dados do formulário
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            // Tratamento especial se tiveres checkboxes para selecionar os eletrónicos (ex: name="itens")
            // Isto transforma as opções selecionadas num array: ["celular", "pilhas"]
            if (formData.has('itens')) {
                data.itens = Array.from(formData.getAll('itens'));
            }

            try {
                // Envia os dados para a rota definida no teu CollectController
                const response = await fetch('/api/collect/request', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                        // Importante: Como esta ação requer que o utilizador esteja logado,
                        // deves enviar o token de autenticação (se já o estiveres a guardar no login)
                        // 'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    alert("Coleta solicitada com sucesso! Acompanhe o estado no seu histórico.");
                    // Redireciona o utilizador para o perfil ou para o histórico de coletas
                    window.location.href = "perfil.html";
                } else {
                    alert("Erro ao solicitar coleta: " + (result.message || "Verifica os dados preenchidos."));
                }
            } catch (error) {
                console.error("Erro na comunicação:", error);
                alert("Erro de ligação ao servidor. Tenta novamente mais tarde.");
            }
        });
    });
</script>
</body>
</html>
