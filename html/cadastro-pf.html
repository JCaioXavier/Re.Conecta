<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Cadastro Pessoa Física - Re.conecta</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/style.css" />

    <style>
        .eye-icon { cursor: pointer; }
    </style>
</head>
<body>

<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 p-0">
    <div class="login-container d-flex flex-column">

        <div class="header-green d-flex align-items-center justify-content-center position-relative pt-4 pb-5">
            <a href="tipo-cadastro.html" class="text-white position-absolute start-0 ms-3 text-decoration-none" style="top: 20px; font-size: 1.5rem;">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold m-0 text-white">Cadastro Re.conecta</h4>
        </div>

        <div class="p-4 form-card">

            <form action="/api/users/register-pf" method="POST" onsubmit="return validarFormulario()">

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-person"></i></span>
                        <input type="text" name="nomeCompleto" class="form-control border-start-0 border-end-0 ps-0" placeholder="Nome completo" required />
                        <span class="input-group-text border-start-0 ps-0 bg-transparent"><i class="bi bi-asterisk" style="font-size: 0.5rem; color: black;"></i></span>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-file-earmark-text"></i></span>
                        <input type="text" id="cpf" name="cpf" class="form-control border-start-0 border-end-0 ps-0" placeholder="CPF (000.000.000-00)" required maxlength="14" minlength="14" oninput="mascaraCPF(this)" />
                        <span class="input-group-text border-start-0 ps-0 bg-transparent"><i class="bi bi-asterisk" style="font-size: 0.5rem; color: black;"></i></span>
                    </div>
                    <div id="erro-cpf" class="text-danger small mt-1" style="display: none;">CPF inválido (deve ter 14 caracteres).</div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control border-start-0 border-end-0 ps-0" placeholder="Email" required />
                        <span class="input-group-text border-start-0 ps-0 bg-transparent"><i class="bi bi-asterisk" style="font-size: 0.5rem; color: black;"></i></span>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-lock"></i></span>
                        <input type="password" id="senha1" name="senha" class="form-control border-start-0 border-end-0 ps-0" placeholder="Senha (Mín. 8 caracteres)" required minlength="8" />
                        <span class="input-group-text border-start-0 eye-icon" onclick="toggleSenha('senha1', this)">
                            <i class="bi bi-eye"></i>
                        </span>
                    </div>
                </div>

                <div class="mb-1">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-lock"></i></span>
                        <input type="password" id="senha2" name="confirmarSenha" class="form-control border-start-0 border-end-0 ps-0" placeholder="Confirmar Senha" required minlength="8" />
                        <span class="input-group-text border-start-0 eye-icon" onclick="toggleSenha('senha2', this)">
                            <i class="bi bi-eye"></i>
                        </span>
                    </div>
                    <div id="erro-senha" class="text-danger small mt-1" style="display: none;">As senhas não são iguais.</div>
                </div>

                <div class="mb-3 text-muted" style="font-size: 0.75rem;">
                    <strong>*</strong> Sua senha precisa ter no mínimo 8 caracteres.
                </div>

                <div class="mb-4">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-telephone"></i></span>
                        <input type="tel" name="telefone" class="form-control border-start-0 ps-0" placeholder="Telefone para contato" oninput="mascaraTelefone(this)" maxlength="15" />
                    </div>
                </div>

                <button type="submit" class="btn btn-reconecta w-100 mb-3 shadow-sm">Cadastrar</button>

                <div class="d-flex align-items-center mb-3">
                    <hr class="flex-grow-1" />
                    <span class="mx-2 text-muted" style="font-size: 0.9rem;">ou</span>
                    <hr class="flex-grow-1" />
                </div>
                <div class="d-flex justify-content-center mb-4">
                    <a href="#" class="social-btn shadow-sm mx-1"><i class="bi bi-google text-danger"></i></a>
                    <a href="#" class="social-btn shadow-sm mx-1"><i class="bi bi-facebook text-primary"></i></a>
                    <a href="#" class="social-btn shadow-sm mx-1"><i class="bi bi-apple text-dark"></i></a>
                </div>
                
                <div class="text-center fw-bold mt-auto">
                    Possui cadastro? <a href="login.html" class="text-success text-decoration-none">Entrar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>

    
    function toggleSenha(inputId, iconSpan) {
        const input = document.getElementById(inputId);
        const icon = iconSpan.querySelector('i');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }

    function mascaraCPF(i) {
        var v = i.value;
        if(isNaN(v[v.length-1])){
           i.value = v.substring(0, v.length-1);
           return;
        }
        i.setAttribute("maxlength", "14");
        v = v.replace(/\D/g, "")
        v = v.replace(/(\d{3})(\d)/, "$1.$2")
        v = v.replace(/(\d{3})(\d)/, "$1.$2")
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2")
        i.value = v;
    }

    function mascaraTelefone(i) {
        var v = i.value;
        v = v.replace(/\D/g, "");
        v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
        v = v.replace(/(\d)(\d{4})$/, "$1-$2");
        i.value = v;
    }

    function validarFormulario() {
        var senha1 = document.getElementById("senha1").value;
        var senha2 = document.getElementById("senha2").value;
        var erroSenha = document.getElementById("erro-senha");
        var valido = true;

        if (senha1 !== senha2) {
            erroSenha.style.display = "block";
            document.getElementById("senha2").focus();
            valido = false;
        } else {
            erroSenha.style.display = "none";
        }

        var cpf = document.getElementById("cpf").value;
        var erroCpf = document.getElementById("erro-cpf");
        if (cpf.length < 14) {
            erroCpf.style.display = "block";
            if(valido) document.getElementById("cpf").focus();
            valido = false;
        } else {
            erroCpf.style.display = "none";
        }

        return valido;
    }

    document.addEventListener('DOMContentLoaded', () => {
    const form = document.querySelector('form');

    form.addEventListener('submit', async (event) => {
        if (!validarFormulario()) {
            event.preventDefault();
            return;
        }

        event.preventDefault();

        const formData = new FormData(form);
        const data = Object.fromEntries(formData);

        try {
            const response = await fetch('/api/users/register-pf', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                alert("Cadastro realizado com sucesso!");
                window.location.href = "login.html";
            } else {
                alert("Erro ao cadastrar: " + (result.message || "Verifique os dados."));
            }
        } catch (error) {
            console.error("Erro na requisição:", error);
            alert("Erro de conexão com o servidor.");
        }
    });
});
</script>

</body>
</html>
