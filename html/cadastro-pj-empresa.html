<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Cadastro Pessoa Jurídica - Re.conecta</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 p-0">
    <div class="login-container d-flex flex-column">

        <div class="header-green d-flex align-items-center justify-content-center position-relative pt-4 pb-5">
            <a href="tipo-cadastro.html" class="text-white position-absolute start-0 ms-3 text-decoration-none" style="top: 20px; font-size: 1.5rem;">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold m-0 text-white">Cadastro Re.conecta</h4>
        </div>

        <div class="p-4 form-card">

            <form action="/api/company/register" method="post" onsubmit="return validarFormulario()">

                <div id="erro-itens" class="text-white small mt-2 text-center" style="display: none;">Selecione pelo menos um item</div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-building"></i></span>
                        <input type="text" id="cnpj" name="cnpj" class="form-control border-start-0 border-end-0 ps-0" placeholder="CNPJ (00.000.000/0000-00)" required oninput="mascaraCNPJ(this)" maxlength="18" />
                        <span class="input-group-text border-start-0 ps-0 bg-transparent"><i class="bi bi-asterisk" style="font-size: 0.5rem; color: black; opacity: 0.5;"></i></span>
                    </div>
                    <div id="erro-cnpj" class="text-danger small mt-1" style="display: none;">CNPJ incompleto (deve ter 14 dígitos).</div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-building-add"></i></span>
                        <input type="text" name="razaoSocial" class="form-control border-start-0 border-end-0 ps-0" placeholder="Razão Social" required />
                        <span class="input-group-text border-start-0 ps-0 bg-transparent"><i class="bi bi-asterisk" style="font-size: 0.5rem; color: black; opacity: 0.5;"></i></span>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-person"></i></span>
                        <input type="text" name="nomeFantasia" class="form-control border-start-0 border-end-0 ps-0" placeholder="Nome Fantasia" required />
                        <span class="input-group-text border-start-0 ps-0 bg-transparent"><i class="bi bi-asterisk" style="font-size: 0.5rem; color: black; opacity: 0.5;"></i></span>
                    </div>
                </div>

                <div class="schedule-box">
                    <div class="schedule-header d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-geo-alt me-2"></i> <span>Endereço</span>
                        </div>
                        <i class="bi bi-asterisk" style="font-size: 0.5rem; color: black; opacity: 0.5;"></i>
                    </div>

                    <div class="schedule-body">
                        <div class="mb-3">
                            <div class="input-group">
                                <input type="text" id="cep" name="cep" class="form-control" placeholder="CEP (00000-000)" required oninput="mascaraCEP(this)" onblur="buscarEndereco(this.value)" maxlength="9" />
                                <span class="input-group-text"><i class="bi bi-search" style="color: black;"></i></span>
                            </div>
                            <div id="erro-cep" class="text-danger small mt-1" style="display: none;">CEP não encontrado.</div>
                        </div>

                        <div class="mb-3"><input type="text" id="endereco" name="endereco" class="form-control" placeholder="Endereço (Preenchimento Automático)" readonly /></div>
                        <div class="mb-3"><input type="text" id="logradouro" name="logradouro" class="form-control" placeholder="Logradouro" required /></div>
                        <div class="mb-3"><input type="text" id="numero" name="numero" class="form-control" placeholder="Número" required /></div>
                        <div class="mb-3"><input type="text" id="bairro" name="bairro" class="form-control" placeholder="Bairro" required /></div>
                        <div class="mb-3"><input type="text" id="municipio" name="municipio" class="form-control" placeholder="Município" required /></div>
                        <div class="mb-3"><input type="text" id="estado" name="estado" class="form-control" placeholder="Estado (UF)" required maxlength="2" /></div>
                        <div class="mb-0"><input type="text" name="complemento" class="form-control" placeholder="Complemento" /></div>
                    </div>
                </div>

                <div class="schedule-box">
                    <div class="schedule-header d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-clock me-2"></i>
                            <span>Horário de Funcionamento</span>
                        </div>
                        <i class="bi bi-asterisk" style="font-size: 0.5rem; color: black; opacity: 0.5;"></i>
                    </div>

                    <div class="schedule-body">
                        <div class="row g-2">
                            <div class="col-6">
                                <div class="time-card">
                                    <div class="time-label">De</div>
                                    <select class="time-select" name="diaInicio">
                                        <option value="SEG" selected>SEGUNDA</option>
                                        <option value="TER">TERÇA</option>
                                        <option value="QUA">QUARTA</option>
                                        <option value="QUI">QUINTA</option>
                                        <option value="SEX">SEXTA</option>
                                        <option value="SAB">SÁBADO</option>
                                        <option value="DOM">DOMINGO</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="time-card">
                                    <div class="time-label">Até</div>
                                    <select class="time-select" name="diaFim">
                                        <option value="SEG">SEGUNDA</option>
                                        <option value="TER">TERÇA</option>
                                        <option value="QUA">QUARTA</option>
                                        <option value="QUI">QUINTA</option>
                                        <option value="SEX" selected>SEXTA</option>
                                        <option value="SAB">SÁBADO</option>
                                        <option value="DOM">DOMINGO</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="time-card">
                                    <div class="time-label">De</div>
                                    <select class="time-select" name="horaInicio">
                                        <option value="06:00">06:00 AM</option>
                                        <option value="07:00">07:00 AM</option>
                                        <option value="08:00" selected>08:00 AM</option>
                                        <option value="09:00">09:00 AM</option>
                                        <option value="10:00">10:00 AM</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="time-card">
                                    <div class="time-label">Até</div>
                                    <select class="time-select" name="horaFim">
                                        <option value="17:00">17:00 PM</option>
                                        <option value="18:00" selected>18:00 PM</option>
                                        <option value="19:00">19:00 PM</option>
                                        <option value="20:00">20:00 PM</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="schedule-box">
                    <div class="schedule-header d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-archive me-2"></i>
                            <span>Tipos de Eletrônicos Aceitos</span>
                        </div>
                        <i class="bi bi-asterisk" style="font-size: 0.5rem; color: var(--primary-black); opacity: 0.5;"></i>
                    </div>

                    <div class="schedule-body">
                        <div class="row g-2">
                            <div class="col-12">
                                <label class="time-card h-100 flex-row justify-content-between px-3" style="cursor: pointer;">
                                    <span class="item-text text-start">Celulares e Acessórios</span>
                                    <input type="checkbox" name="itens" value="celulares" class="custom-radio" />
                                </label>
                            </div>
                            <div class="col-12">
                                <label class="time-card h-100 flex-row justify-content-between px-3" style="cursor: pointer;">
                                    <span class="item-text text-start">Computadores e Periféricos</span>
                                    <input type="checkbox" name="itens" value="computadores" class="custom-radio" />
                                </label>
                            </div>
                            <div class="col-12">
                                <label class="time-card h-100 flex-row justify-content-between px-3" style="cursor: pointer;">
                                    <span class="item-text text-start">Televisores e Áudio/Vídeo</span>
                                    <input type="checkbox" name="itens" value="tvs" class="custom-radio" />
                                </label>
                            </div>
                            <div class="col-12">
                                <label class="time-card h-100 flex-row justify-content-between px-3" style="cursor: pointer;">
                                    <span class="item-text text-start">Eletroportáteis</span>
                                    <input type="checkbox" name="itens" value="eletroportateis" class="custom-radio" />
                                </label>
                            </div>
                            <div class="col-12">
                                <label class="time-card h-100 flex-row justify-content-between px-3" style="cursor: pointer;">
                                    <span class="item-text text-start">Pilhas e Baterias</span>
                                    <input type="checkbox" name="itens" value="pilhas" class="custom-radio" />
                                </label>
                            </div>
                            <div class="col-12">
                                <label class="time-card h-100 flex-row justify-content-between px-3" style="cursor: pointer;">
                                    <span class="item-text text-start">Cabos e Componentes</span>
                                    <input type="checkbox" name="itens" value="cabos" class="custom-radio" />
                                </label>
                            </div>
                            <div class="col-12">
                                <label class="time-card h-100 flex-row justify-content-between px-3" style="cursor: pointer;">
                                    <span class="item-text text-start">Pequenos Eletrodomésticos</span>
                                    <input type="checkbox" name="itens" value="pequenos" class="custom-radio" />
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-reconecta w-100 mb-3 shadow-sm mt-2">Continuar <i class="bi bi-arrow-right"></i></button>

            </form>
        </div>
    </div>
</div>

<script>
    // --- MÁSCARAS E BUSCA DE CEP (Já existentes no seu código) ---
    function mascaraCNPJ(i) {
        var v = i.value.replace(/\D/g, "");
        v = v.replace(/^(\d{2})(\d)/, "$1.$2");
        v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
        v = v.replace(/\.(\d{3})(\d)/, ".$1/$2");
        v = v.replace(/(\d{4})(\d)/, "$1-$2");
        i.value = v;
    }

    function mascaraCEP(i) {
        var v = i.value.replace(/\D/g, "").replace(/^(\d{5})(\d)/, "$1-$2");
        i.value = v;
    }

    function buscarEndereco(cep) {
        const cepLimpo = cep.replace(/\D/g, '');
        if (cepLimpo.length === 8) {
            fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`)
                .then(res => res.json())
                .then(data => {
                    if (!data.erro) {
                        document.getElementById('logradouro').value = data.logradouro;
                        document.getElementById('bairro').value = data.bairro;
                        document.getElementById('municipio').value = data.localidade;
                        document.getElementById('estado').value = data.uf;
                        document.getElementById('numero').focus();
                        document.getElementById('erro-cep').style.display = 'none';
                    } else {
                        document.getElementById('erro-cep').style.display = 'block';
                    }
                });
        }
    }

    // --- LÓGICA DE ENVIO PARA O BACKEND (FETCH) ---
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.querySelector('form');

        form.addEventListener('submit', async (event) => {
            // 1. Validação Visual
            if (!validarFormulario()) {
                event.preventDefault();
                return;
            }

            event.preventDefault(); // Impede o recarregamento

            // 2. Captura dos dados
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            // 3. Tratamento especial para Checkboxes (Itens Aceitos)
            // No backend, isto chegará como um array: ["celulares", "pilhas"]
            data.itensAceitos = Array.from(formData.getAll('itens'));

            try {
                const response = await fetch('/api/company/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    alert("Dados da empresa guardados! Vamos agora cadastrar o representante.");
                    // Redireciona para a segunda parte do cadastro PJ
                    window.location.href = "cadastro-pj-representante.html";
                } else {
                    alert("Erro no cadastro: " + (result.message || "Verifique os dados da empresa."));
                }
            } catch (error) {
                console.error("Erro na ligação:", error);
                alert("Erro de conexão com o servidor.");
            }
        });
    });

    function validarFormulario() {
        const cnpj = document.getElementById("cnpj").value;
        const itens = document.querySelectorAll('input[name="itens"]:checked');
        let valido = true;

        if (cnpj.length < 18) {
            document.getElementById("erro-cnpj").style.display = "block";
            valido = false;
        } else {
            document.getElementById("erro-cnpj").style.display = "none";
        }

        if (itens.length === 0) {
            document.getElementById("erro-itens").style.display = "block";
            valido = false;
        } else {
            document.getElementById("erro-itens").style.display = "none";
        }

        return valido;
    }
</script>
</script>
</body>
</html>
