<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Cadastro Representante - Re.conecta</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 p-0">
    <div class="login-container d-flex flex-column">

        <div class="header-green d-flex align-items-center justify-content-center position-relative pt-4 pb-5">
            <a href="cadastro-pj.html" class="text-white position-absolute start-0 ms-3 text-decoration-none" style="top: 20px; font-size: 1.5rem;">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold m-0 text-white">Cadastro Re.conecta</h4>
        </div>

        <div class="p-4 form-card">

            <form action="sucesso.html" method="post">

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-person"></i></span>
                        <input type="text" name="nomeCompleto" class="form-control border-start-0 border-end-0 ps-0" placeholder="Nome completo" required />
                        <span class="input-group-text border-start-0 ps-0 bg-transparent"><i class="bi bi-asterisk" style="font-size: 0.5rem; color: black; opacity: 0.5;"></i></span>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-file-earmark-text"></i></span>
                        <input type="text" name="cpf" id="cpf" class="form-control border-start-0 border-end-0 ps-0" placeholder="CPF" required oninput="mascaraCPF(this)" maxlength="14" />
                        <span class="input-group-text border-start-0 ps-0 bg-transparent"><i class="bi bi-asterisk" style="font-size: 0.5rem; color: black; opacity: 0.5;"></i></span>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control border-start-0 border-end-0 ps-0" placeholder="Email (Interno)" required />
                        <span class="input-group-text border-start-0 ps-0 bg-transparent"><i class="bi bi-asterisk" style="font-size: 0.5rem; color: black; opacity: 0.5;"></i></span>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-briefcase"></i></span>
                        <input type="text" name="cargo" class="form-control border-start-0 border-end-0 ps-0" placeholder="Cargo" required />
                        <span class="input-group-text border-start-0 ps-0 bg-transparent"><i class="bi bi-asterisk" style="font-size: 0.5rem; color: black; opacity: 0.5;"></i></span>
                    </div>
                </div>

                <div class="mb-5">
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-telephone"></i></span>
                        <input type="tel" name="telefone" class="form-control border-start-0 border-end-0 ps-0" placeholder="Telefone (Interno)" required oninput="mascaraTelefone(this)" maxlength="15" />
                        <span class="input-group-text border-start-0 ps-0 bg-transparent"><i class="bi bi-asterisk" style="font-size: 0.5rem; color: black; opacity: 0.5;"></i></span>
                    </div>
                </div>

                <button type="submit" class="btn btn-reconecta w-100 mb-3 shadow-sm mt-auto">Cadastrar</button>

            </form>

            <div id="alerta-erro" class="alert alert-warning py-2 small mb-3" style="display: none;">
                <i class="bi bi-exclamation-triangle-fill"></i> CPF ou E-mail já cadastrado no sistema.
            </div>
        </div>
    </div>
</div>

<script>
    function mascaraCPF(i) {
        var v = i.value;
        if(isNaN(v[v.length-1])){ i.value = v.substring(0, v.length-1); return; }
        i.setAttribute("maxlength", "14");
        v = v.replace(/\D/g, "")
        v = v.replace(/(\d{3})(\d)/, "$1.$2")
        v = v.replace(/(\d{3})(\d)/, "$1.$2")
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2")
        i.value = v;
    }

    function mascaraTelefone(i) {
        var v = i.value;
        v = v.replace(/\D/g, "");
        v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
        v = v.replace(/(\d)(\d{4})$/, "$1-$2");
        i.value = v;
    }
</script>

</body>
</html>
