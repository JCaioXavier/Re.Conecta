<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Meu Cadastro - Re.conecta</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 p-0">
    <div class="login-container d-flex flex-column">
        <div class="header-green d-flex align-items-center justify-content-center position-relative pt-4 pb-5">
            <a href="perfil.html" class="text-white position-absolute start-0 ms-3 text-decoration-none" style="top: 20px; font-size: 1.5rem;">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold m-0 text-white">Meu Cadastro</h4>
        </div>

        <div class="p-4 form-card">
            <form id="updateForm">
                <div class="text-center mb-4">
                    <div class="profile-pic mx-auto mb-2" style="width: 80px; height: 80px; font-size: 2rem;">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <p class="text-muted small">ID do Usuário: #2908</p>
                </div>

                <div class="mb-3">
                    <label class="fw-bold mb-1">Nome Completo</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" value="Ryan Austin" required />
                    </div>
                </div>

                <div class="mb-3">
                    <label class="fw-bold mb-1">E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0" value="ryan.austin@email.com" required />
                    </div>
                </div>

                <div class="mb-3">
                    <label class="fw-bold mb-1">Telefone</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-telephone"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" value="(82) 99999-9999" id="telInput" />
                    </div>
                </div>

                <button type="submit" class="btn btn-reconecta w-100 shadow-sm mt-3">Salvar Alterações</button>
            </form>

            <div class="delete-section text-center">
                <h6 class="text-danger fw-bold"><i class="bi bi-exclamation-triangle-fill"></i> Zona de Perigo</h6>
                <p class="small text-muted">Ao excluir sua conta, todos os seus pontos e histórico de coletas serão removidos permanentemente.</p>
                <button type="button" class="btn btn-outline-danger btn-sm w-100" onclick="confirmDelete()">Excluir Minha Conta</button>
            </div>

            <div class="bottom-nav-wrapper">
            <div class="bottom-nav">
                <a href="../index.html" class="nav-item"><i class="bi bi-house-door-fill"></i></a>
                <a href="perfil.html" class="nav-item active"><i class="bi bi-person-fill"></i></a>
                <div class="nav-center" style="display: flex; justify-content: center; align-items: center;">
                    <img src="../images/logo-reconecta-navbar.svg" 
                        alt="Logo" 
                        style="width: px; height: px; margin-top: px;">
                </div>
                <a href="contato-suporte.html" class="nav-item"><i class="bi bi-chat-left-text-fill"></i></a>
                <a href="resgatar-recompensa.html" class="nav-item"><i class="bi bi-shop"></i></a>
            </div>
        </div>
        </div>
    </div>


</div>



<script>
    function confirmDelete() {
        if (confirm("Tem certeza que deseja excluir sua conta? Esta ação não pode ser desfeita.")) {
            alert("Conta excluída com sucesso. Redirecionando...");
            window.location.href = "login.html";
        }
    }

    document.getElementById('updateForm').onsubmit = function(e) {
        e.preventDefault();
        alert("Dados atualizados com sucesso!");
    };
</script>
</body>
</html>
