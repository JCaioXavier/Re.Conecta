<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Meu Cadastro - Re.conecta</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 p-0">
    <div class="login-container d-flex flex-column">
        <div class="header-green d-flex align-items-center justify-content-center position-relative pt-4 pb-5">
            <a href="perfil.html" class="text-white position-absolute start-0 ms-3 text-decoration-none" style="top: 20px; font-size: 1.5rem;">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold m-0 text-white">Meu Cadastro</h4>
        </div>

        <div class="p-4 form-card">
            <form id="updateForm">
                <div class="text-center mb-4">
                    <div class="profile-pic mx-auto mb-2" style="width: 80px; height: 80px; font-size: 2rem;">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <p class="text-muted small">ID do Usuário: #2908</p>
                </div>

                <div class="mb-3">
                    <label class="fw-bold mb-1">Nome Completo</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" value="Ryan Austin" required />
                    </div>
                </div>

                <div class="mb-3">
                    <label class="fw-bold mb-1">E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0" value="ryan.austin@email.com" required />
                    </div>
                </div>

                <div class="mb-3">
                    <label class="fw-bold mb-1">Telefone</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-telephone"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" value="(82) 99999-9999" id="telInput" />
                    </div>
                </div>

                <button type="submit" class="btn btn-reconecta w-100 shadow-sm mt-3">Salvar Alterações</button>
            </form>

            <div class="delete-section text-center">
                <h6 class="text-danger fw-bold"><i class="bi bi-exclamation-triangle-fill"></i> Zona de Perigo</h6>
                <p class="small text-muted">Ao excluir sua conta, todos os seus pontos e histórico de coletas serão removidos permanentemente.</p>
                <button type="button" class="btn btn-outline-danger btn-sm w-100" onclick="confirmDelete()">Excluir Minha Conta</button>
            </div>
        </div>
        </div>
    </div>


</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const form = document.getElementById('updateForm');
        const telInput = document.getElementById('telInput');

        try {
            const response = await fetch('/api/user/profile');
            const data = await response.json();

            if (response.ok) {
                form.querySelector('input[type="text"]').value = data.nomeCompleto || '';
                form.querySelector('input[type="email"]').value = data.email || '';
                telInput.value = data.telefone || '';
            } else {
                console.error("Erro ao carregar dados do perfil:", data.message);
            }
        } catch (error) {
            console.error("Erro de rede:", error);
        }
        telInput.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
            v = v.replace(/(\d)(\d{4})$/, "$1-$2");
            e.target.value = v;
        });


        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const updatedData = {
                nomeCompleto: form.querySelector('input[type="text"]').value,
                email: form.querySelector('input[type="email"]').value,
                telefone: telInput.value
            };

            try {
                const response = await fetch('/api/user/update', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updatedData)
                });

                const result = await response.json();

                if (response.ok) {
                    alert("Dados atualizados com sucesso!");
                } else {
                    alert("Erro na atualização: " + (result.message || "Tenta novamente."));
                }
            } catch (error) {
                console.error("Erro ao enviar dados:", error);
                alert("Erro de ligação ao servidor.");
            }
        });
    });
    
    async function confirmDelete() {
        if (confirm("Tens a certeza que desejas eliminar a tua conta? Todos os teus pontos e histórico serão removidos permanentemente.")) {
            try {
                const response = await fetch('/api/user/delete', {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert("A tua conta foi eliminada. Esperamos ver-te em breve!");
                    localStorage.clear();
                    window.location.href = "login.html";
                } else {
                    alert("Não foi possível eliminar a conta neste momento.");
                }
            } catch (error) {
                console.error("Erro na eliminação:", error);
            }
        }
    }
</script>
</body>
</html>
